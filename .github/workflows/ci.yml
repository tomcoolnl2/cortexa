name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - run: npx nx run-many -t lint --exclude=cortexa

            - run: npx nx run-many -t test --exclude=cortexa

            - run: npx nx run-many -t build --exclude=cortexa
